<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Decision</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0c0c0e;
  --surf:   #131316;
  --surf2:  #1a1a1f;
  --surf3:  #202027;
  --brd:    #252529;
  --brd2:   #3a3a42;
  --txt:    #f0f0f2;
  --dim:    #7a7a85;
  --muted:  #35353d;
  --green:  #3dd68c;
  --yellow: #f5c542;
  --red:    #f56565;
  --blue:   #5b9cf6;
  --mono:   'IBM Plex Mono', monospace;
  --sans:   'Manrope', sans-serif;
  --r:      10px;
  --r-sm:   6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── Screens ─── */
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }

/* ─── INTRO ─── */
.intro-wrap {
  padding: 48px 24px 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  flex: 1;
  min-height: 100vh;
}
.i-logo {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .3em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 36px;
}
.i-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.i-title {
  font-size: 30px;
  font-weight: 300;
  line-height: 1.3;
  color: var(--txt);
  letter-spacing: -.03em;
  margin-bottom: 16px;
}
.i-title strong { font-weight: 700; }
.i-sub {
  font-size: 15px;
  font-weight: 400;
  color: var(--dim);
  line-height: 1.65;
}
.i-divider {
  height: 1px;
  background: var(--brd);
  margin: 28px 0;
}
.h-title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .25em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.h-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  background: var(--surf);
  border: 1px solid var(--brd);
  border-radius: var(--r-sm);
  margin-bottom: 6px;
}
.h-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.h-dot.do-now { background: var(--green); }
.h-dot.plan   { background: var(--yellow); }
.h-dot.noise  { background: var(--red); }
.h-dot.pause  { background: var(--blue); }
.h-text {
  font-size: 13px;
  color: var(--dim);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 400;
}
.h-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  flex-shrink: 0;
}
.intro-bottom { margin-top: 32px; }

/* ─── FLOW: Header ─── */
.hdr {
  padding: 18px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hdr-logo {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .25em;
  color: var(--muted);
  text-transform: uppercase;
}
.hdr-step {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
}

/* ─── Progress ─── */
.prog {
  margin: 14px 20px 0;
  height: 3px;
  background: var(--surf3);
  border-radius: 2px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--dim);
  border-radius: 2px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* ─── Step content ─── */
.content {
  flex: 1;
  padding: 28px 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
#step-content { transition: opacity .22s ease, transform .22s ease; }

/* ─── Question ─── */
.q-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .25em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: 500;
}
.q-text {
  font-size: 22px;
  font-weight: 500;
  line-height: 1.35;
  color: var(--txt);
  letter-spacing: -.02em;
}
.q-sub {
  margin-top: 10px;
  font-size: 13px;
  color: var(--dim);
  line-height: 1.6;
  font-weight: 400;
}

/* ─── Thought display ─── */
.t-disp {
  background: var(--surf);
  border: 1px solid var(--brd);
  border-left: 3px solid var(--brd2);
  padding: 12px 16px;
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--dim);
  line-height: 1.55;
  font-style: italic;
  font-weight: 400;
}

/* ─── Textarea ─── */
textarea {
  width: 100%;
  background: var(--surf);
  border: 1px solid var(--brd);
  border-radius: var(--r-sm);
  color: var(--txt);
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.65;
  padding: 16px;
  resize: none;
  outline: none;
  min-height: 120px;
  transition: border-color .2s;
  -webkit-appearance: none;
  display: block;
}
textarea:focus { border-color: var(--brd2); }
textarea::placeholder { color: var(--muted); }
.ta-hint {
  margin-top: 7px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .05em;
}

/* ─── Options ─── */
.opts { display: flex; flex-direction: column; gap: 8px; }
.opt {
  background: var(--surf);
  border: 1px solid var(--brd);
  border-left: 3px solid transparent;
  border-radius: var(--r-sm);
  padding: 15px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  text-align: left;
  width: 100%;
  font-family: inherit;
  transition: border-color .15s, background .15s, border-left-color .15s;
  -webkit-user-select: none;
  user-select: none;
}
.opt:active { background: var(--surf2); }
.opt.sel {
  border-color: var(--brd2);
  border-left-color: var(--txt);
  background: var(--surf2);
}
.opt-ico {
  font-size: 16px;
  flex-shrink: 0;
  width: 20px;
  text-align: center;
  line-height: 1;
}
.opt-body { flex: 1; }
.opt-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--txt);
  line-height: 1.3;
}
.opt-desc {
  font-size: 12px;
  color: var(--dim);
  margin-top: 3px;
  line-height: 1.4;
  font-weight: 400;
}
/* Radio — hidden, selection shown via left border */
.opt-radio {
  width: 18px; height: 18px;
  border: 1px solid var(--brd);
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  background: transparent;
}
.opt.sel .opt-radio {
  background: var(--txt);
  border-color: var(--txt);
}
.opt.sel .opt-radio::after {
  content: '';
  width: 6px; height: 6px;
  background: var(--bg);
  border-radius: 50%;
  display: block;
}

/* ─── Grid (source) ─── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.g-opt {
  background: var(--surf);
  border: 1px solid var(--brd);
  border-radius: var(--r-sm);
  padding: 16px 14px 14px;
  cursor: pointer;
  text-align: left;
  width: 100%;
  font-family: inherit;
  transition: border-color .15s, background .15s;
  -webkit-user-select: none;
  user-select: none;
  display: block;
  position: relative;
}
.g-opt:active { background: var(--surf2); }
.g-opt.sel {
  border-color: var(--txt);
  background: var(--surf2);
}
.g-opt.sel::after {
  content: '';
  position: absolute;
  top: 8px; right: 8px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--txt);
}
.g-ico {
  font-size: 22px;
  display: block;
  margin-bottom: 8px;
  line-height: 1;
}
.g-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--txt);
  line-height: 1.35;
}

/* ─── Warnings ─── */
.warn {
  border-radius: var(--r-sm);
  padding: 11px 14px;
  font-size: 13px;
  line-height: 1.5;
  font-weight: 400;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.warn-y { background: #16110a; border: 1px solid #3d2e00; color: #d4a017; }
.warn-b { background: #0a0e18; border: 1px solid #1a2a4d; color: #6b9cf0; }

/* ─── Primary button ─── */
.btn {
  width: 100%;
  background: var(--txt);
  color: var(--bg);
  border: none;
  border-radius: var(--r-sm);
  padding: 17px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  -webkit-user-select: none;
  user-select: none;
  display: block;
}
.btn:disabled { opacity: .2; cursor: not-allowed; }
.btn:not(:disabled):active { transform: scale(.98); opacity: .88; }

/* ─── Outline button ─── */
.btn-out {
  width: 100%;
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--brd);
  border-radius: var(--r-sm);
  padding: 15px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  -webkit-user-select: none;
  user-select: none;
  display: block;
}
.btn-out:active { border-color: var(--brd2); color: var(--txt); }

/* ─── VERDICT ─── */
.v-wrap {
  padding: 28px 20px 36px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
}
.v-t-lbl {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .25em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.v-t-txt {
  font-size: 14px;
  color: var(--dim);
  font-style: italic;
  line-height: 1.55;
  padding-left: 14px;
  border-left: 2px solid var(--brd);
  font-weight: 400;
}

/* Verdict card */
.v-card {
  background: var(--surf);
  border: 1px solid var(--brd);
  border-radius: var(--r);
  padding: 22px;
}
.v-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 5px 11px;
  border-radius: 4px;
  margin-bottom: 18px;
}
.v-badge.do-now { background: #081a0a; color: var(--green); border: 1px solid #1a3d1a; }
.v-badge.plan   { background: #181200; color: var(--yellow); border: 1px solid #3d2e00; }
.v-badge.noise  { background: #1a0808; color: var(--red);    border: 1px solid #3d1a1a; }
.v-badge.pause  { background: #080e1a; color: var(--blue);   border: 1px solid #1a2a4d; }

.v-srow { display: flex; align-items: center; gap: 18px; margin-bottom: 18px; }
.v-ring { position: relative; width: 68px; height: 68px; flex-shrink: 0; }
.v-ring-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 600;
}
.v-sinfo { flex: 1; }
.v-sinfo-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 3px;
}
.v-sinfo-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}
.v-main {
  font-size: 24px;
  font-weight: 600;
  line-height: 1.25;
  color: var(--txt);
  margin-bottom: 20px;
  letter-spacing: -.025em;
}
.v-nl {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-top: 16px;
  border-top: 1px solid var(--brd);
}
.v-nt {
  font-size: 15px;
  color: var(--txt);
  line-height: 1.55;
  font-weight: 400;
}

/* Breakdown */
.bd-title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.br-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.br-name {
  font-size: 12px;
  color: var(--dim);
  width: 105px;
  flex-shrink: 0;
  font-weight: 400;
}
.br-track {
  flex: 1;
  height: 4px;
  background: var(--surf3);
  border-radius: 2px;
  overflow: hidden;
}
.br-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--dim);
}
.br-val {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  width: 30px;
  text-align: right;
}

/* Factors */
.f-row {
  font-size: 12px;
  color: var(--dim);
  display: flex;
  gap: 8px;
  line-height: 1.45;
  margin-top: 6px;
  font-weight: 400;
}
.f-dash { color: var(--muted); flex-shrink: 0; }

.v-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
</style>
</head>
<body>

<div id="screen-intro" class="screen active">
  <div class="intro-wrap">
    <div>
      <div class="i-logo">Decision</div>
      <div class="i-eyebrow">Инструмент предпринимателя</div>
      <div class="i-title"><strong>Убирает шум.</strong><br>Оставляет решение.</div>
      <div class="i-sub">Мысль о бизнесе крутится в голове? Прогони через инструмент — получи вердикт за 3 минуты.</div>
      <div id="hist-block" style="display:none">
        <div class="i-divider"></div>
        <div class="h-title">Последние решения</div>
        <div id="hist-list"></div>
      </div>
    </div>
    <div class="intro-bottom">
      <button class="btn" id="intro-btn">Разобрать мысль →</button>
    </div>
  </div>
</div>

<div id="screen-flow" class="screen">
  <div class="hdr">
    <div class="hdr-logo">Decision</div>
    <div id="step-counter" class="hdr-step">1 / 10</div>
  </div>
  <div class="prog"><div class="prog-fill" id="prog-fill" style="width:10%"></div></div>
  <div class="content" id="step-content"></div>
</div>

<div id="screen-verdict" class="screen">
  <div class="v-wrap" id="verd-content"></div>
</div>

<script>
(function() {

var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }

var SQ = { data:2, client:2, recurring:2, competitor:1, intuition:0, media:0 };

var S = {};
function reset() {
  S = { thought:'', emotion:null, readiness:null, level:null, source:null,
        signal:null, deterioration:null, costIn:null, costOut:null, reversibility:null };
}
reset();

var step = 0;

var STEPS = ['thought','emotion','readiness','level','source','signal','deterioration','costIn','costOut','reversibility'];
var TYPES = { thought:'ta', emotion:'opts', readiness:'opts', level:'opts', source:'grid',
              signal:'opts', deterioration:'opts', costIn:'opts', costOut:'opts', reversibility:'opts' };
var LABELS = { thought:'Мысль', emotion:'Состояние', readiness:'Готовность', level:'Уровень',
               source:'Источник', signal:'Сигнал', deterioration:'Динамика',
               costIn:'Цена входа', costOut:'Цена бездействия', reversibility:'Обратимость' };
var QS = {
  thought:'Что тебя зацепило?',
  emotion:'Как ты сейчас?',
  readiness:'Ты бы сейчас подписал договор на крупную сумму?',
  level:'На каком уровне эта мысль?',
  source:'Откуда эта мысль?',
  signal:'Есть подтверждения, что это реальная проблема?',
  deterioration:'Если не делать — станет хуже?',
  costIn:'Цена внедрения — деньги, время, фокус?',
  costOut:'Что теряешь, если не делать?',
  reversibility:'Если сделать и ошибиться — можно откатить?'
};
var QSUB = { thought:'Одним-двумя предложениями. Не что хочешь сделать — а что беспокоит или не даёт покоя.' };

var OPTS = {
  emotion:[
    {val:0,ico:'●',color:'#3dd68c',title:'Спокойно',desc:'Думаю трезво, без давления'},
    {val:1,ico:'●',color:'#f5c542',title:'Есть лёгкое возбуждение',desc:'Немного заряжен, но контролирую'},
    {val:2,ico:'●',color:'#f56565',title:'Сильно заряжен',desc:'Злость, эйфория или тревога'}
  ],
  readiness:[
    {val:2,ico:'✓',color:'#3dd68c',title:'Да, без сомнений',desc:''},
    {val:1,ico:'~',color:'#f5c542',title:'Наверное да, с оговорками',desc:''},
    {val:0,ico:'✗',color:'#f56565',title:'Нет, подождал бы',desc:''}
  ],
  level:[
    {val:0,ico:'○',color:'',title:'Операционный',desc:'Задача, процесс, исполнение'},
    {val:1,ico:'◑',color:'',title:'Тактический',desc:'Направление, канал, продукт'},
    {val:2,ico:'●',color:'',title:'Стратегический',desc:'Позиционирование, модель, структура'}
  ],
  signal:[
    {val:2,ico:'✓',color:'#3dd68c',title:'Да',desc:'Факты, цифры, несколько случаев'},
    {val:1,ico:'~',color:'#f5c542',title:'Частично',desc:'Что-то есть, но слабо'},
    {val:0,ico:'✗',color:'#f56565',title:'Нет',desc:'Пока только ощущение'}
  ],
  deterioration:[
    {val:2,ico:'↑',color:'#f56565',title:'Да, нарастает',desc:''},
    {val:1,ico:'→',color:'#7a7a85',title:'Останется как есть',desc:''},
    {val:0,ico:'↓',color:'#3dd68c',title:'Скорее нет',desc:''}
  ],
  costIn:[
    {val:0,ico:'●',color:'#3dd68c',title:'Низкая',desc:'Быстро, дёшево, не отвлекает команду'},
    {val:1,ico:'●',color:'#f5c542',title:'Средняя',desc:'Требует усилий, но подъёмно'},
    {val:2,ico:'●',color:'#f56565',title:'Высокая',desc:'Дорого, долго, нагрузит команду'}
  ],
  costOut:[
    {val:2,ico:'●',color:'#f56565',title:'Высокая',desc:'Деньги, клиенты, возможности уходят'},
    {val:1,ico:'●',color:'#f5c542',title:'Средняя',desc:'Есть потери, но терпимо'},
    {val:0,ico:'●',color:'#3dd68c',title:'Низкая',desc:'Ничего страшного не случится'}
  ],
  reversibility:[
    {val:2,ico:'✓',color:'#3dd68c',title:'Да, легко',desc:''},
    {val:1,ico:'~',color:'#f5c542',title:'Частично, с потерями',desc:''},
    {val:0,ico:'✗',color:'#f56565',title:'Нет — необратимо',desc:''}
  ]
};

var GRID=[
  {val:'data',      ico:'📊', title:'Данные / метрика'},
  {val:'client',    ico:'💬', title:'Клиент / обратная связь'},
  {val:'recurring', ico:'🔁', title:'Повторяющаяся проблема'},
  {val:'competitor',ico:'👀', title:'Конкурент / рынок'},
  {val:'intuition', ico:'💡', title:'Интуиция / ощущение'},
  {val:'media',     ico:'📰', title:'Разговор / статья / пост'}
];

function g(id) { return document.getElementById(id); }

function mk(tag, cls, txt) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined) e.textContent = txt;
  return e;
}

function showScreen(name) {
  ['intro','flow','verdict'].forEach(function(n) {
    var s = g('screen-' + n);
    if (s) s.classList.remove('active');
  });
  var t = g('screen-' + name);
  if (t) t.classList.add('active');
}

function initIntro() {
  var hist = loadHist();
  if (hist.length) {
    var block = g('hist-block');
    var list = g('hist-list');
    if (block) block.style.display = 'block';
    if (list) {
      list.innerHTML = '';
      var shown = hist.slice(0, 3);
      for (var i = 0; i < shown.length; i++) {
        var h = shown[i];
        var item = mk('div','h-item');
        var dot = mk('div','h-dot ' + h.verdict);
        var txt = mk('div','h-text', h.thought);
        var date = mk('div','h-date', h.date);
        item.appendChild(dot);
        item.appendChild(txt);
        item.appendChild(date);
        list.appendChild(item);
      }
    }
  }
  showScreen('intro');
}

function startNew() {
  reset();
  step = 0;
  showScreen('flow');
  renderStep();
}

function renderStep() {
  var id = STEPS[step];
  var total = STEPS.length;
  var num = step + 1;

  var ctr = g('step-counter');
  if (ctr) ctr.textContent = num + ' / ' + total;
  var pf = g('prog-fill');
  if (pf) pf.style.width = Math.round(num / total * 100) + '%';

  var cnt = g('step-content');
  if (!cnt) return;

  cnt.style.opacity = '0';
  cnt.style.transform = 'translateY(10px)';

  setTimeout(function() {
    cnt.innerHTML = '';

    var qb = mk('div');
    qb.appendChild(mk('div','q-label', LABELS[id]));
    qb.appendChild(mk('div','q-text', QS[id]));
    if (QSUB[id]) qb.appendChild(mk('div','q-sub', QSUB[id]));
    cnt.appendChild(qb);

    if (step > 0 && S.thought) {
      cnt.appendChild(mk('div','t-disp', S.thought));
    }

    if (id !== 'emotion' && id !== 'readiness' && id !== 'thought' && S.emotion === 2) {
      cnt.appendChild(mk('div','warn warn-y', '\u26a0  Горячее состояние. Учтено в расчёте.'));
    }
    if (id === 'signal' && S.level === 2) {
      cnt.appendChild(mk('div','warn warn-b', '\u25b3  Стратегический уровень — порог для "делать сейчас" выше.'));
    }

    var type = TYPES[id];
    if (type === 'ta') {
      buildTA(cnt);
    } else if (type === 'opts') {
      buildOpts(cnt, id);
    } else if (type === 'grid') {
      buildGrid(cnt);
    }

    var canGo = (type === 'ta') ? (S.thought.trim().split(/\s+/).length >= 3) : (S[id] !== null);
    var btn = mk('button','btn', step === STEPS.length - 1 ? '\u2192 Получить вердикт' : '\u2192 Далее');
    btn.id = 'next-btn';
    btn.disabled = !canGo;
    btn.onclick = nextStep;
    cnt.appendChild(btn);

    cnt.style.transition = 'opacity .22s ease, transform .22s ease';
    cnt.style.opacity = '1';
    cnt.style.transform = 'translateY(0)';

    if (type === 'ta') {
      var ta = g('thought-ta');
      if (ta) setTimeout(function() { ta.focus(); }, 100);
    }
  }, 150);
}

function buildTA(parent) {
  var ta = document.createElement('textarea');
  ta.id = 'thought-ta';
  ta.placeholder = 'Например: не знаю, стоит ли открывать второй офис...';
  ta.rows = 5;
  ta.value = S.thought;
  ta.oninput = function() {
    S.thought = ta.value;
    var btn = g('next-btn');
    if (btn) btn.disabled = S.thought.trim().split(/\s+/).length < 3;
  };
  parent.appendChild(ta);
  parent.appendChild(mk('div','ta-hint','Минимум 3 слова'));
}

function buildOpts(parent, id) {
  var list = OPTS[id];
  if (!list) return;
  var wrap = mk('div','opts');
  for (var i = 0; i < list.length; i++) {
    (function(opt) {
      var btn = mk('button','opt' + (S[id] === opt.val ? ' sel' : ''));
      btn.setAttribute('data-v', String(opt.val));

      var ico = mk('div','opt-ico', opt.ico);
      ico.style.color = opt.color || 'var(--txt)';

      var body = mk('div','opt-body');
      body.appendChild(mk('div','opt-title', opt.title));
      if (opt.desc) body.appendChild(mk('div','opt-desc', opt.desc));

      var radio = mk('div','opt-radio');
      btn.appendChild(ico);
      btn.appendChild(body);
      btn.appendChild(radio);
      btn.onclick = function() { pickOpt(id, opt.val, wrap); };
      wrap.appendChild(btn);
    })(list[i]);
  }
  parent.appendChild(wrap);
}

function buildGrid(parent) {
  var wrap = mk('div','grid');
  for (var i = 0; i < GRID.length; i++) {
    (function(opt) {
      var btn = mk('button','g-opt' + (S.source === opt.val ? ' sel' : ''));
      btn.setAttribute('data-v', opt.val);
      btn.appendChild(mk('span','g-ico', opt.ico));
      btn.appendChild(mk('div','g-title', opt.title));
      btn.onclick = function() { pickGrid(opt.val, wrap); };
      wrap.appendChild(btn);
    })(GRID[i]);
  }
  parent.appendChild(wrap);
}

function pickOpt(id, val, wrap) {
  S[id] = val;
  var btns = wrap.querySelectorAll('.opt');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('data-v') === String(val)) btns[i].classList.add('sel');
    else btns[i].classList.remove('sel');
  }
  var nb = g('next-btn');
  if (nb) nb.disabled = false;
  haptic();
}

function pickGrid(val, wrap) {
  S.source = val;
  var btns = wrap.querySelectorAll('.g-opt');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('data-v') === val) btns[i].classList.add('sel');
    else btns[i].classList.remove('sel');
  }
  var nb = g('next-btn');
  if (nb) nb.disabled = false;
  haptic();
}

function haptic() {
  if (tg && tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
}

function nextStep() {
  var id = STEPS[step];
  var type = TYPES[id];
  if (type === 'ta' && S.thought.trim().split(/\s+/).length < 3) return;
  if (type !== 'ta' && S[id] === null) return;
  if (step < STEPS.length - 1) {
    step++;
    window.scrollTo(0, 0);
    renderStep();
  } else {
    showVerdict();
  }
}

function score() {
  var sq = (SQ[S.source] || 0) / 2;
  var sig = (S.signal * 0.5 + sq * 2 * 0.3 + S.deterioration * 0.2) / 2;
  var eff = (S.costOut - S.costIn + 2) / 4;
  var rev = S.reversibility / 2;
  var act = sig * 0.5 + eff * 0.4 + rev * 0.1;
  var lp = S.level * 0.12;
  var ep = [0, 0.08, 0.20][S.emotion] || 0;
  var rp = S.readiness === 0 ? 0.10 : 0;
  var fin = Math.max(0, act - lp - ep - rp);
  var v = null, sr = null;
  if (S.emotion === 2 && S.level === 2 && S.signal <= 1) {
    v = 'pause'; sr = 'горячее состояние + стратегический уровень + слабый сигнал';
  } else if (S.reversibility === 0 && S.level === 2) {
    v = 'plan'; sr = 'необратимое стратегическое решение';
  } else if (fin >= 0.65) { v = 'do-now';
  } else if (fin >= 0.35) { v = 'plan';
  } else { v = 'noise'; }
  return { v:v, fin:fin, sig:sig, eff:eff, act:act, lp:lp, ep:ep, rp:rp, sr:sr, ew:S.emotion >= 1 };
}

var VLBL = { 'do-now':'\u2713 Действие', 'plan':'\u25ce Гипотеза', 'noise':'\u2717 Шум', 'pause':'\u23f8 Пауза' };
var VTXT = { 'do-now':'Делать сейчас.', 'plan':'Запланировать / проверить гипотезой.', 'noise':'Отложить. Скорее всего это шум.', 'pause':'Не принимай сейчас.' };
var VCOL = { 'do-now':'#3dd68c', 'plan':'#f5c542', 'noise':'#f56565', 'pause':'#5b9cf6' };

function nextAction(r) {
  if (r.v === 'pause') return 'Вернись к этому завтра — в нынешнем состоянии решение будет хуже.';
  if (r.v === 'do-now') {
    var acts = ['Поставь задачу в трекер с дедлайном на эту неделю.',
                'Запусти минимальный эксперимент за 1–2 недели.',
                'Назначь встречу команды для согласования направления.'];
    return acts[S.level] || acts[0];
  }
  if (r.v === 'plan') {
    if (r.sr && r.sr.indexOf('необратим') >= 0) return 'Проведи анализ рисков и получи второе мнение до действия.';
    if (S.emotion === 2) return 'Вернись к этому завтра в спокойном состоянии.';
    if (S.signal <= 1) return 'Собери 3 подтверждения из разных источников, потом решай.';
    return 'Запиши как гипотезу и проверь через 2 недели с конкретным критерием.';
  }
  return S.signal === 0 ? 'Архивируй. Если вернётся сама — значит важна.' : 'Закрой. Если вернётся сама — значит важна.';
}

function showVerdict() {
  var r = score();
  var pct = Math.round(r.fin * 100);
  var na = nextAction(r);
  saveHist(S.thought, r.v, r.fin);

  var wrap = g('verd-content');
  if (!wrap) return;
  wrap.innerHTML = '';

  wrap.appendChild(mk('div','v-t-lbl','Анализ завершён'));
  wrap.appendChild(mk('div','v-t-txt', S.thought));

  var card = mk('div','v-card');
  card.appendChild(mk('div','v-badge ' + r.v, VLBL[r.v] || r.v));

  var srow = mk('div','v-srow');
  var rw = mk('div','v-ring');
  var col = VCOL[r.v] || '#888';
  var circ = 2 * Math.PI * 22;
  var dash = (r.fin * circ).toFixed(1) + ' ' + circ.toFixed(1);

  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','68'); svg.setAttribute('height','68'); svg.setAttribute('viewBox','0 0 68 68');
  svg.style.transform = 'rotate(-90deg)';
  var c1 = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c1.setAttribute('cx','34'); c1.setAttribute('cy','34'); c1.setAttribute('r','22');
  c1.setAttribute('fill','none'); c1.setAttribute('stroke','#1a1a1f'); c1.setAttribute('stroke-width','4');
  var c2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c2.setAttribute('cx','34'); c2.setAttribute('cy','34'); c2.setAttribute('r','22');
  c2.setAttribute('fill','none'); c2.setAttribute('stroke', col); c2.setAttribute('stroke-width','4');
  c2.setAttribute('stroke-dasharray', dash); c2.setAttribute('stroke-linecap','round');
  svg.appendChild(c1); svg.appendChild(c2);
  rw.appendChild(svg);
  rw.appendChild(mk('div','v-ring-num', String(pct)));

  var si = mk('div','v-sinfo');
  si.appendChild(mk('div','v-sinfo-label', 'Score ' + pct + ' / 100'));
  si.appendChild(mk('div','v-sinfo-sub', 'порог действия: 65'));

  srow.appendChild(rw); srow.appendChild(si);
  card.appendChild(srow);
  card.appendChild(mk('div','v-main', VTXT[r.v] || r.v));

  if (r.ew && r.v !== 'pause') {
    var ew = mk('div','warn warn-y', '\u26a0  Ты сейчас немного заряжен. Учти это.');
    ew.style.marginBottom = '16px';
    card.appendChild(ew);
  }

  card.appendChild(mk('div','v-nl','Следующий шаг'));
  card.appendChild(mk('div','v-nt', na));
  wrap.appendChild(card);

  wrap.appendChild(mk('div','bd-title','Что повлияло'));
  addBar(wrap, 'Сила сигнала', r.sig, '');
  addBar(wrap, 'Б-я vs вход', r.eff, '');
  addBar(wrap, 'Итог', r.fin, col);

  var factors = [];
  if (r.lp > 0) factors.push('Стратегический уровень: -' + Math.round(r.lp * 100) + '%');
  if (r.ep > 0) factors.push('Эмоциональный фон: -' + Math.round(r.ep * 100) + '%');
  if (r.rp > 0) factors.push('Не готов к решениям: -10%');
  if (r.sr) factors.push('Правило: ' + r.sr);
  for (var i = 0; i < factors.length; i++) {
    var fr = mk('div','f-row');
    fr.appendChild(mk('span','f-dash','—'));
    fr.appendChild(mk('span','',factors[i]));
    wrap.appendChild(fr);
  }

  var acts = mk('div','v-actions');
  var b1 = mk('button','btn','\u2192 Новая мысль');
  b1.onclick = startNew;
  var b2 = mk('button','btn-out','\u2190 На главную');
  b2.onclick = initIntro;
  acts.appendChild(b1); acts.appendChild(b2);
  wrap.appendChild(acts);

  showScreen('verdict');
  window.scrollTo(0, 0);
  if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

function addBar(parent, label, val, color) {
  var row = mk('div','br-row');
  row.appendChild(mk('div','br-name', label));
  var tr = mk('div','br-track');
  var fl = mk('div','br-fill');
  fl.style.width = Math.round(val * 100) + '%';
  if (color) fl.style.background = color;
  tr.appendChild(fl);
  row.appendChild(tr);
  row.appendChild(mk('div','br-val', Math.round(val * 100) + '%'));
  parent.appendChild(row);
}

function saveHist(thought, verdict, sc) {
  try {
    var h = JSON.parse(localStorage.getItem('dh') || '[]');
    h.unshift({ thought: String(thought).slice(0,80), verdict: verdict, score: Math.round(sc*100),
                date: new Date().toLocaleDateString('ru',{day:'numeric',month:'short'}) });
    localStorage.setItem('dh', JSON.stringify(h.slice(0,10)));
  } catch(e) {}
}

function loadHist() {
  try { return JSON.parse(localStorage.getItem('dh') || '[]'); } catch(e) { return []; }
}

var introBtn = g('intro-btn');
if (introBtn) introBtn.onclick = startNew;

initIntro();

})();
</script>
</body>
</html>
